# Cucumber E2E Test Profile Configuration
# Only contains test-specific overrides - inherits all other settings from application.yml

app:
  cors:
    # Cucumber test CORS settings - allow multiple local ports for testing
    allowed-origins: http://localhost:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:3000,http://localhost:5173

  config:
    # Cyoda Platform Connection - Cucumber Test Configuration
    cyoda-host: localhost:8443
    cyoda-api-url: https://localhost:8443/api
    cyoda-client-id: m2m.user
    cyoda-client-secret: 7JnG1kxKOvLjGp4LMYso

    # gRPC Configuration - Cucumber Tests
    grpc-address: localhost
    grpc-server-port: 9443
    grpc-processor-tag: cucumber-java-test

    # gRPC Channel Configuration - Increased for large test operations
    grpc-max-inbound-message-size: 33554432  # 32MB for very large operations
    grpc-keep-alive-time-seconds: 15  # More frequent keep-alive for tests

    # SSL Configuration for development with self-signed certificates
    # WARNING: Only use in development/testing - NOT for production
    ssl-trust-all: true
    ssl-trusted-hosts: localhost:8443,localhost:9443,localhost