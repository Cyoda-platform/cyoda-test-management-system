logging:
  level:
    root: INFO

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      resolve-lazily: false

app:
  auth:
    filter:
      enabled: false
  config:
    cyoda-host: localhost
    cyoda-api-url: http://localhost:8080/api
    cyoda-client-id: test-client
    cyoda-client-secret: test-secret
    grpc-address: localhost
    grpc-server-port: 50051

